name: Overnight Report

on:
  workflow_call:
    inputs:
      dry_run:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      dry_run:
        required: false
        default: true
        type: boolean

jobs:
  report:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: overnight-*
          path: ${{ github.workspace }}/.overnight-artifacts
          merge-multiple: true

      - name: Generate report
        id: report
        env:
          ARTIFACT_DIR: ${{ github.workspace }}/.overnight-artifacts
        run: scripts/overnight/generate-report.sh

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: overnight-report
          path: ${{ github.workspace }}/.overnight-artifacts/reports/overnight-report.md

      - name: Notify
        env:
          ARTIFACT_DIR: ${{ github.workspace }}/.overnight-artifacts
          REPORT_PATH: ${{ github.workspace }}/.overnight-artifacts/reports/overnight-report.md
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: scripts/overnight/notify.sh
